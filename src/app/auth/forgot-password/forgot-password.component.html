<div class="auth-container">
  <div class="auth-box">
    <div class="auth-header">
      <h1>Reset Password</h1>
      <p>Enter your email to reset your password</p>
    </div>

    <form [formGroup]="resetForm" (ngSubmit)="onSubmit()" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          formControlName="email"
          placeholder="your@email.com"
          class="form-control">
        <span class="error-message" *ngIf="isFieldInvalid('email')">
          Please enter a valid email
        </span>
      </div>

      <button 
        type="submit" 
        class="btn btn-primary btn-lg"
        [disabled]="!resetForm.valid || isLoading">
        <span *ngIf="!isLoading">Send Reset Link</span>
        <span *ngIf="isLoading">Sending...</span>
      </button>

      <div class="message" [class.success]="successMessage" [class.error]="errorMessage" *ngIf="successMessage || errorMessage">
        {{ successMessage || errorMessage }}
      </div>
    </form>

    <div class="auth-footer">
      <p>Remember your password? 
        <a routerLink="/auth/login">Sign in here</a>
      </p>
    </div>
  </div>

  <div class="auth-background">
    <div class="gradient-blob"></div>
    <div class="gradient-blob blob-2"></div>
  </div>
</div>
