<div class="my-tasks-container">
  <div class="section-header">
    <div class="header-content">
      <h1>My Tasks</h1>
      <p>Manage your assigned tasks</p>
    </div>
  </div>

  <div class="filters-bar">
    <input type="text" placeholder="Search tasks..." class="search-input" />
    <select class="filter-select">
      <option>All Status</option>
      <option>Todo</option>
      <option>In Progress</option>
      <option>Completed</option>
    </select>
    <select class="filter-select">
      <option>All Priority</option>
      <option>High</option>
      <option>Medium</option>
      <option>Low</option>
    </select>
  </div>

  <div class="tasks-list">
    <div class="task-item" *ngFor="let task of myTasks">
      <input type="checkbox" [checked]="task.completed" class="task-checkbox" (change)="onToggleTask(task.id)">
      <div class="task-content">
        <div class="task-header">
          <h4>{{ task.title }}</h4>
          <span class="priority-badge" [class]="'priority-' + task.priority.toLowerCase()">{{ task.priority }}</span>
        </div>
        <p class="task-description">{{ task.description }}</p>
        <div class="task-meta">
          <span class="meta-item">📅 {{ task.dueDate }}</span>
          <span class="status-badge" [class]="'status-' + task.status.toLowerCase()">{{ task.status }}</span>
        </div>
      </div>
      <div class="task-actions">
        <button class="action-btn edit" title="Edit" (click)="onEditTask(task.id)">✏️</button>
      </div>
    </div>
    <p *ngIf="myTasks.length === 0">No tasks found.</p>
  </div>
</div>
