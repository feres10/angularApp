<div class="my-projects-container">
  <div class="section-header">
    <div class="header-content">
      <h1>My Projects</h1>
      <p>Projects assigned to you</p>
    </div>
  </div>

  <div class="filters-bar">
    <input type="text" placeholder="Search your projects..." class="search-input" />
    <select class="filter-select">
      <option>All Status</option>
      <option>Active</option>
      <option>Completed</option>
      <option>On Hold</option>
    </select>
  </div>

  <div class="projects-grid">
    <div class="project-card" *ngFor="let project of myProjects">
      <div class="card-header">
        <h3>{{ project.name }}</h3>
        <span class="status-badge" [class]="'status-' + project.status.toLowerCase()">{{ project.status }}</span>
      </div>
      <p class="project-description">{{ project.description }}</p>
      <div class="project-meta">
        <div class="meta-item">
          <span class="label">Manager</span>
          <span class="value">{{ project.manager }}</span>
        </div>
        <div class="meta-item">
          <span class="label">Due Date</span>
          <span class="value">{{ project.dueDate }}</span>
        </div>
      </div>
      <div class="card-footer">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="project.progress"></div>
        </div>
        <span class="progress-text">{{ project.progress }}% Complete</span>
      </div>
      <div class="card-actions">
        <button class="action-btn view" title="View Details" (click)="onViewProject(project.id)">👁️</button>
        <button class="action-btn edit" title="Edit" (click)="onEditProject(project.id)">✏️</button>
      </div>
    </div>
    <p *ngIf="myProjects.length === 0">No projects found.</p>
  </div>
</div>
