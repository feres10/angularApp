<div class="modal-overlay" *ngIf="isOpen" (click)="onClose()">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>{{ title }}</h2>
      <button class="close-btn" (click)="onClose()">x</button>
    </div>
    <div class="modal-body">
      <ng-content></ng-content>
    </div>
    <div class="modal-footer">
      <button *ngIf="showCancelButton" class="btn-secondary" (click)="onClose()">{{ cancelText }}</button>
      <button class="btn-primary" (click)="onConfirm()" [disabled]="isConfirmDisabled">{{ confirmText }}</button>
    </div>
  </div>
</div>
